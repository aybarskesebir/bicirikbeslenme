<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damla'nın Programı - İnteraktif Takip</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #557A46; 
            --primary-hover: #3A5A2D;
            --secondary: #D08C60; 
            --bg: #F3EFE0; 
            --card-bg: #FFFDF7; 
            --text: #433D3C; 
            --macro-pro: #5B8A72;
            --macro-fat: #C06C53;
            --macro-carb: #E3B23C;
            --macro-kcal: #4A6741;
            --wood-border: #8B5A2B; 
            --heading-color: #7A4B20;
            --ing-bg: #EAE6D7;
            --ing-border: #D08C60;
            --calendar-active: #557A46;
            --delete-red: #C06C53;
        }

        :root[data-theme="dark"] {
            --primary: #4A6741; 
            --secondary: #B56B3F; 
            --bg: #2C2621; 
            --card-bg: #3E352F; 
            --text: #F3EFE0;
            --wood-border: #1E1A16;
            --heading-color: #E4B58A;
            --ing-bg: #2C2621;
            --ing-border: #8B5A2B;
            --calendar-active: #B56B3F;
            --delete-red: #D67A60;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
            transition: background-color 0.3s, color 0.3s;
            background-image: radial-gradient(var(--wood-border) 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .app-container {
            max-width: 650px; width: 100%;
            background: var(--card-bg);
            border-radius: 24px; border: 4px solid var(--wood-border);
            box-shadow: 6px 6px 0px rgba(139, 90, 43, 0.15);
            overflow: hidden; position: relative;
        }

        .header {
            background: var(--primary); color: #FFFDF7;
            padding: 25px 20px; text-align: center;
            border-bottom: 4px solid var(--wood-border);
            position: relative;
        }
        .header h1 { 
            margin: 0; font-size: 26px; font-weight: 900; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .fairy-icon { cursor: pointer; user-select: none; font-size: 32px; transition: 0.2s; }
        .fairy-icon:active { transform: scale(0.8); }
        .header p { margin: 5px 0 0 0; font-size: 15px; font-weight: 600; opacity: 0.9; color: #FFFDF7; }
        
        .header-actions {
            position: absolute; top: 15px; right: 15px;
            display: flex; gap: 8px;
        }
        .action-btn {
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
            color: white; padding: 6px 10px; border-radius: 10px;
            cursor: pointer; font-size: 14px; font-weight: bold; font-family: 'Nunito';
        }

        .calendar-wrapper {
            background: var(--ing-bg); padding: 15px 20px;
            border-bottom: 3px dashed var(--wood-border);
        }
        /* TAKVİM HEADER PANELİ */
        .calendar-header-panel {
            background: var(--card-bg); border: 3px solid var(--wood-border);
            border-radius: 16px; padding: 10px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 0 var(--wood-border);
        }
        .calendar-header-panel button {
            background: var(--secondary); color: white; border: 2px solid var(--wood-border);
            padding: 6px 14px; border-radius: 8px; font-weight: 900; cursor: pointer;
            box-shadow: 0 3px 0 var(--wood-border); font-family: 'Nunito';
        }
        .calendar-header-panel button:active { transform: translateY(3px); box-shadow: none; }
        .calendar-month-title { font-size: 18px; font-weight: 900; color: var(--heading-color); cursor: pointer; margin: 0;}

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day-name { text-align: center; font-size: 11px; font-weight: 900; color: var(--heading-color); opacity: 0.8; padding-bottom: 4px; }
        .cal-day {
            height: 42px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--card-bg); border: 2px solid rgba(139, 90, 43, 0.2);
            border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 14px;
            position: relative; transition: 0.2s;
        }
        .cal-day.disabled { opacity: 0.25; cursor: default; }
        .cal-day.active { background: var(--calendar-active); color: white; border-color: var(--wood-border); box-shadow: 0 2px 0px var(--wood-border); }
        .cal-water-mark { font-size: 11px; position: absolute; bottom: 0px; left: 3px; }
        .cal-cart-mark { font-size: 12px; position: absolute; top: -2px; right: 2px; }

        .content { padding: 25px; }
        .badges { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center;}
        .badge {
            padding: 8px 14px; border-radius: 12px; font-size: 14px; font-weight: 800; color: white; 
            display: flex; align-items: center; gap: 6px; border: 2px solid var(--wood-border); cursor: pointer; transition: 0.2s;
        }
        .badge:hover { transform: scale(1.05); }
        .badge-phase { background: var(--secondary); }
        .badge-workout { background: var(--primary); }

        .meal-card {
            background: var(--card-bg); border: 3px solid var(--wood-border);
            padding: 18px; margin-bottom: 18px; border-radius: 16px;
            box-shadow: 4px 4px 0px rgba(139, 90, 43, 0.1); position: relative;
        }
        .meal-card::before { content: "📍"; position: absolute; top: -10px; left: -10px; font-size: 20px; }
        .meal-card h3 { margin: 0 0 12px 0; color: var(--heading-color); font-size: 18px; font-weight: 900; }
        .module-select {
            width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 10px;
            border: 2px solid var(--wood-border); background-color: var(--card-bg); font-weight: 800; font-family: 'Nunito'; color: var(--text);
        }
        .meal-text-content { margin: 0 0 15px 0; font-size: 15px; line-height: 1.6; font-weight: 600; color: var(--text); }

        .ingredients-list {
            background-color: var(--ing-bg); padding: 12px; border-radius: 10px;
            border: 2px dashed var(--ing-border); font-weight: 600; font-size: 15px; color: var(--text);
        }
        .ingredients-list strong { color: var(--heading-color); display: block; margin-bottom: 10px; font-size: 16px;}
        .ingredient-item { display: flex; align-items: flex-start; margin-bottom: 10px; cursor: pointer; }
        .ingredient-item input { margin-right: 12px; accent-color: var(--primary); width: 18px; height: 18px; margin-top:3px; }
        .ingredient-item.checked { text-decoration: line-through; opacity: 0.6; }

        /* BELİRGİN İKSİR VURGUSU */
        .iron-highlight-banner {
            background: linear-gradient(135deg, #FF6B6B, #EE5253); color: white;
            padding: 12px; border-radius: 12px; border: 3px solid var(--wood-border);
            margin-bottom: 15px; font-weight: 900; text-align: center;
            box-shadow: 0 4px 0 var(--wood-border); animation: pulse-banner 2s infinite;
        }
        @keyframes pulse-banner { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .tracker-section {
            background: var(--ing-bg); border-radius: 16px; padding: 20px;
            margin-top: 25px; text-align: center; border: 3px solid var(--wood-border);
        }
        .tracker-title { font-weight: 900; color: var(--heading-color); margin-bottom: 15px; display: block; font-size: 16px;}
        .water-grid { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; z-index: 2; position: relative;}
        .water-drop { font-size: 28px; cursor: pointer; filter: grayscale(1); transition: 0.2s; transform: scale(0.9);}
        .water-drop.active { filter: grayscale(0); transform: scale(1.1); }

        .gerbera-container {
            display: none; justify-content: center; align-items: center; flex-direction: column;
            margin-top: 15px; padding-top: 15px; border-top: 2px dashed rgba(139, 90, 43, 0.3);
            animation: bloom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        .gerbera-flower { font-size: 60px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2)); }
        @keyframes bloom { 0% { transform: scale(0) rotate(-20deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }

        .supp-grid { display: flex; justify-content: center; gap: 20px; font-size: 16px; font-weight: 800; flex-wrap: wrap;}
        .supp-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .supp-item input { accent-color: var(--secondary); width: 20px; height: 20px; }

        .shopping-list-trigger {
            background: var(--secondary); color: white; width: 100%; border: 3px solid var(--wood-border);
            padding: 15px; border-radius: 12px; margin-bottom: 25px; cursor: pointer;
            font-weight: 900; display: none; font-size: 16px; font-family: 'Nunito';
            box-shadow: 0 4px 0px var(--wood-border); transition: 0.2s;
        }

        /* MODAL STİLLERİ (FROZEN HEADER) */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 38, 33, 0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--bg); border-radius: 20px; border: 4px solid var(--wood-border);
            max-width: 85%; width: 450px; max-height: 80vh; overflow: hidden;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-header-fixed {
            padding: 20px; background: var(--bg); border-bottom: 3px dashed var(--wood-border);
            z-index: 10; position: sticky; top: 0; flex-shrink: 0;
        }
        .modal-body { padding: 20px; overflow-y: auto; flex-grow: 1; font-weight: 700; color: var(--text); font-size: 15.5px; line-height: 1.6;}
        .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 28px; color: var(--wood-border); cursor: pointer; font-weight: 900; }
        .modal-title { color: var(--heading-color); font-weight: 900; margin: 0; font-size: 18px;}

        /* ALIŞVERİŞ LİSTESİ STİLLERİ */
        .shopping-row {
            display: flex; align-items: flex-start; justify-content: space-between;
            margin-bottom: 12px; border-bottom: 1px dashed rgba(139, 90, 43, 0.2); padding-bottom: 8px;
        }
        .shopping-item-check { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; flex-grow: 1; font-weight: 700;}
        .shopping-item-check input { width: 18px; height: 18px; accent-color: var(--primary); margin-top:3px; }
        .shopping-item-check input:checked + span { text-decoration: line-through; opacity: 0.5; }
        .delete-item-btn {
            background: var(--delete-red); color: white; border: 2px solid var(--wood-border);
            border-radius: 6px; min-width: 28px; height: 28px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 12px; margin-left: 10px;
        }

        .extra-input-group { display: flex; gap: 8px; margin-top: 15px; }
        .extra-input { flex-grow: 1; padding: 10px; border-radius: 8px; border: 2px solid var(--wood-border); font-family: 'Nunito'; font-weight: 700; background: var(--card-bg); color: var(--text); }
        .extra-add-btn { background: var(--primary); color: white; border: 2px solid var(--wood-border); padding: 0 15px; border-radius: 8px; font-weight: 900; cursor: pointer; font-family: 'Nunito'; }

        .copy-btn {
            width: 100%; background: var(--primary); color: white; border: 3px solid var(--wood-border);
            padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; font-family: 'Nunito';
            margin-top: 15px; font-size: 15px; box-shadow: 0 4px 0 var(--wood-border);
        }

        /* YEMEK EKLEME FORMU */
        .meal-form label { display: block; margin-top: 10px; font-weight: 800; color: var(--heading-color); }
        .meal-form input, .meal-form select, .meal-form textarea {
            width: 100%; padding: 10px; border-radius: 8px; border: 2px solid var(--wood-border);
            margin-top: 5px; font-family: 'Nunito'; font-weight: 700; box-sizing: border-box; background: var(--card-bg); color: var(--text);
        }
        .save-meal-btn { width: 100%; background: var(--primary); color: white; padding: 12px; border-radius: 10px; border: 3px solid var(--wood-border); font-weight: 900; margin-top: 20px; cursor: pointer; font-family: 'Nunito'; }

        .macro-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; justify-content: center; }
        .macro-badge { padding: 6px 10px; border-radius: 8px; font-size: 13px; font-weight: 900; color: white; border: 2px solid rgba(0,0,0,0.15);}
        .m-pro { background: var(--macro-pro); } .m-fat { background: var(--macro-fat); }
        .m-carb { background: var(--macro-carb); } .m-kcal { background: var(--macro-kcal); }
        
        .total-summary {
            background: var(--primary); padding: 20px; border-radius: 16px; margin-top: 25px;
            text-align: center; border: 3px solid var(--wood-border); color: white;
            box-shadow: 4px 4px 0px rgba(139, 90, 43, 0.2);
        }
        .total-summary h3 { margin: 0 0 15px 0; color: white; font-weight: 900;}
        .total-summary .macro-row { justify-content: center; }

        .month-btn {
            display: block; width: 100%; background: var(--ing-bg); border: 2px solid var(--wood-border);
            padding: 10px; margin-bottom: 10px; border-radius: 8px; font-weight: 800; font-family: 'Nunito';
            color: var(--text); cursor: pointer; transition: 0.2s;
        }
        .month-btn:hover { background: var(--secondary); color: white; }

        /* PERİ VE YILDIZ EFEKTLERİ */
        .floating-fairy { position: fixed; font-size: 45px; z-index: 9999; pointer-events: none; animation: hoverFairy 2s ease-in-out infinite alternate; }
        .fairy-star { position: fixed; font-size: 20px; z-index: 9998; color: #FFD700; animation: starFade 0.8s forwards; pointer-events: none; text-shadow: 0 0 5px rgba(255, 215, 0, 0.8);}
        @keyframes hoverFairy { from { transform: translateY(0); } to { transform: translateY(-20px); } }
        @keyframes starFade { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: translateY(30px) scale(0.5); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="header-actions">
            <button class="action-btn" onclick="openModal('addMeal')" title="Yeni Yemek Ekle">➕ Tarif</button>
            <button class="action-btn" onclick="toggleTheme()" title="Gece/Gündüz Modu">🌙</button>
        </div>
        <h1><span class="fairy-icon" onclick="triggerFairy()">🧚‍♀️</span> Damla'nın Programı</h1>
        <p>Lipit Düşürücü & Hipertrofi Odaklı Biyokimya Mutfağı</p>
    </div>
    
    <div class="calendar-wrapper">
        <div class="calendar-header-panel">
            <button onclick="changeDay(-1)">&#8592; Dün</button>
            <h3 class="calendar-month-title" id="calendarMonthTitle" onclick="openModal('month')">Nisan 2026 ▾</h3>
            <button onclick="changeDay(1)">Yarın &#8594;</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="content">
        <button id="shopListBtn" class="shopping-list-trigger" onclick="openShoppingList()">🛒 Haftalık Pazar Listesi Hazır!</button>

        <div class="badges">
            <div class="badge badge-phase" onclick="openModal('phase')">
                <span id="phaseBadgeText">Faz 1</span> <span class="info-icon">?</span>
            </div>
            <div class="badge badge-workout" onclick="openModal('workout')">
                <span id="workoutBadgeText">Antrenman</span> <span class="info-icon">?</span>
            </div>
        </div>

        <div id="mealsContainer">
            <div class="meal-card">
                <h3>🍳 Brunch (~11:30)</h3>
                <select id="brunchSelect" class="module-select" onchange="updateMeal('brunch')"></select>
                <div id="brunchIron"></div>
                <div id="brunchText" class="meal-text-content"></div>
                <div class="macro-row" id="brunchMacros" style="justify-content: flex-start; display:flex;"></div>
                <div class="ingredients-list" id="brunchIngredients"></div>
            </div>
            <div class="meal-card">
                <h3>🍓 Ara Öğün (~16:00)</h3>
                <select id="snackSelect" class="module-select" onchange="updateMeal('snack')"></select>
                <div id="snackText" class="meal-text-content"></div>
                <div class="macro-row" id="snackMacros" style="justify-content: flex-start; display:flex;"></div>
                <div class="ingredients-list" id="snackIngredients"></div>
            </div>
            <div class="meal-card">
                <h3>🍲 Akşam Yemeği (~19:30)</h3>
                <select id="dinnerSelect" class="module-select" onchange="updateMeal('dinner')"></select>
                <div id="dinnerText" class="meal-text-content"></div>
                <div class="macro-row" id="dinnerMacros" style="justify-content: flex-start; display:flex;"></div>
                <div class="ingredients-list" id="dinnerIngredients"></div>
            </div>
        </div>

        <div class="tracker-section">
            <span class="tracker-title">💧 Günlük Su İhtiyacın (2.5L)</span>
            <div class="water-grid" id="waterGrid"></div>
            <div class="gerbera-container" id="gerberaContainer">
                <div class="gerbera-flower" id="gerberaFlower">🌼</div>
                <div style="font-weight:900; color:var(--primary); margin-top:5px;">Günün Çiçeği Açtı!</div>
            </div>
            <div class="supp-grid" style="margin-top:20px;">
                <label class="supp-item" id="ironSuppLabel" style="display:none; color:var(--delete-red);">
                    <input type="checkbox" id="supp_iron" onchange="saveSuppState()"> 🩸 Demir & Lacto.
                </label>
                <label class="supp-item"><input type="checkbox" id="supp_mag" onchange="saveSuppState()"> 🪨 Magnezyum</label>
                <label class="supp-item"><input type="checkbox" id="supp_vit" onchange="saveSuppState()"> ☀️ D3/K2</label>
            </div>
        </div>

        <div class="total-summary">
            <h3>⭐ Gün Sonu Bereketi</h3>
            <div class="macro-row" id="totalMacros"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="genericModal" onclick="closeModal(event, 'genericModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header-fixed">
            <button onclick="closeModal(true, 'genericModal')" class="modal-close">&times;</button>
            <h3 class="modal-title" id="modalTitle">Başlık</h3>
        </div>
        <div class="modal-body" id="modalBody">İçerik</div>
    </div>
</div>

<script>
    // --- EASTER EGG: UÇAN PERİLER ---
    let fairyClicks = 0;
    function triggerFairy() {
        fairyClicks++;
        if (fairyClicks === 7) {
            spawnFairies();
            fairyClicks = 0; 
        }
    }
    function spawnFairies() {
        for (let i = 0; i < 7; i++) {
            let f = document.createElement('div');
            f.innerHTML = "🧚‍♀️";
            f.className = "floating-fairy";
            f.style.left = (Math.random() * 80 + 10) + "%";
            f.style.top = (Math.random() * 50 + 20) + "%";
            f.style.animationDelay = (Math.random() * 1) + "s";
            document.body.appendChild(f);
            
            setTimeout(() => {
                f.style.animation = "none";
                f.style.transition = "top 1.2s cubic-bezier(0.5, 0, 1, 1), transform 1.2s";
                
                let starInterval = setInterval(() => {
                    let rect = f.getBoundingClientRect();
                    if (rect.top < -50) { clearInterval(starInterval); return; }
                    let star = document.createElement('div');
                    star.className = "fairy-star";
                    star.innerHTML = "✨";
                    star.style.left = (rect.left + (Math.random() * 20 - 10)) + "px";
                    star.style.top = (rect.top + 40) + "px";
                    document.body.appendChild(star);
                    setTimeout(() => star.remove(), 800);
                }, 80);

                setTimeout(() => { f.style.top = "-100px"; f.style.transform = "scale(1.5)"; }, 50);
                setTimeout(() => { f.remove(); clearInterval(starInterval); }, 1500);
            }, 3000 + (Math.random() * 1000));
        }
    }

    // --- VERİTABANI VE AÇIKLAMALAR ---
    const explanations = {
        phases: { 
            "Faz 1: Adaptasyon": "<strong>Vücutta Ne Oluyor?</strong> Yeni hap kutusuna yeni başladın. Vücuduna giren hormonlar sayesinde sistemin dengeye oturuyor.<br><br><strong>Ne Hissedeceksin?</strong> Enerjin yavaş yavaş yükseliyor. Vücudun yeni beslenme düzenine (~1450 kcal) ve yağ yakımına (trigliserit düşüşüne) alışmaya çalışıyor.<br><br><strong>Ne Yapıyoruz?</strong> Antrenmanlarda formumuzu oturtuyoruz, kendimizi çok fazla hırpalamadan kasları yeni düzene adapte ediyoruz.", 
            "Faz 2: Hacim Artışı": "<strong>Vücutta Ne Oluyor?</strong> Haplar sayesinde hormonların tamamen sabit. Klasik kadın döngüsündeki o meşhur 'tatlı krizleri' veya 'PMS gerginlikleri' sende kesinlikle yok!<br><br><strong>Ne Hissedeceksin?</strong> İnsülin duyarlılığın harika, kendini tok ve çok güçlü hissedeceksin. Kasların büyümeye (hipertrofiye) aç.<br><br><strong>Ne Yapıyoruz?</strong> Ağırlıkları bir tık (%10 kadar) artırıyoruz. Kaslarımızı zorluyor, yediğimiz o güzel proteinleri doğrudan kas inşasına gönderiyoruz.", 
            "Faz 3: Pik Kuvvet": "<strong>Vücutta Ne Oluyor?</strong> Hap kutusunun son haftasındasın. Vücudun anabolik (yapıcı) enerjinin zirvesinde.<br><br><strong>Ne Hissedeceksin?</strong> Fiziksel olarak ayın en güçlü olduğun haftası. Glikojen depoların antrenman için mükemmel çalışıyor.<br><br><strong>Ne Yapıyoruz?</strong> Sınırlarımızı zorluyoruz! En ağır kilolara giriyoruz. Yağ yakımı ve kas gelişimi için ayın en verimli eforunu bu hafta harcıyoruz.", 
            "Faz 4: Deload (Onarım)": "<strong>Vücutta Ne Oluyor?</strong> Hap bitti, ara verdin. Dışarıdan aldığın hormon kesildiği için rahim duvarın dökülüyor ve kanaman (çekilme kanaması) başlıyor.<br><br><strong>Ne Hissedeceksin?</strong> Hormon eksikliğine bağlı yorgunluk, hafif ödem, kramp ve demir kaybı başlayacak. Vücut 'beni dinlendir' diyecek.<br><br><strong>Ne Yapıyoruz?</strong> Vücutla savaşmıyoruz! Ağırlıkları ciddi şekilde hafifletiyoruz. Magnezyum, demir (Oreferon) ve iyi uyku ile kanama stresini atlatıp, hücrelerimizi bir sonraki ayın döngüsü için tamir ediyoruz."
        },
        workouts: { 
            "Ağırlık (Tüm Vücut)": "Tüm ana kas gruplarını (bacak, sırt, göğüs) tek seansta çalıştıran temel kuvvet antrenmanı.", 
            "Grup Dersi (Kardiyo)": "Kalp ritmini yükselterek lipit (yağ) oksidasyonunu hızlandıran ve kondisyonu artıran hareketli seans.", 
            "Dinlenme": "Aktif toparlanma günü. Kasların onarılması ve büyümesi için hayati önem taşır. Bol su içilmesi önerilir.", 
            "Doğa Yürüyüşü": "LISS (Düşük Yoğunluklu Sabit Seviyeli) kardiyo. Hem mental rahatlama sağlar hem de eklemleri yormadan yağ yakımını destekler.", 
            "Ağırlık (Hipertrofi)": "Kas liflerinde mikro yırtıklar oluşturarak kasın hacimsel olarak büyümesini hedefleyen 8-12 tekrarlı antrenman.", 
            "Ağırlık (Maksimum Efor)": "1-5 tekrar aralığında, sinir sistemini zorlayan ve saf kuvvet artışını hedefleyen ağır antrenman.", 
            "Ağırlık (Hafif)": "Kaslara sadece kan pompalayarak onarımı hızlandırmayı amaçlayan, eklemleri yormayan düşük ağırlıklı çalışma." 
        }
    };

    const masterShoppingList = [
        { category: "🥩 1. KASAP VE PROTEİN", items: ["Tavuk Göğsü: 600g", "Yağsız Dana Kıyma: 600g", "Yumurta: 15'li Paket"] },
        { category: "🧀 2. PEYNİR VE SÜT ÜRÜNLERİ", items: ["Taze Mozzarella: 2 Top", "Ricotta Peyniri: 250g", "İtalyan Loru: 200g", "Süzme Yoğurt: 1kg"] },
        { category: "🥑 3. MANAV VE YEŞİLLİK", items: ["Avokado: 3 Adet", "Patlıcan: 4 Adet", "Salkım Domates: 6 Adet", "Yeşillikler (Fesleğen, Roka, Nane)", "Limon: 6 Adet"] },
        { category: "🍓 4. MEYVE REYONU", items: ["Çilek & Yaban Mersini", "Yeşil Elma & Armut", "Ananas, Muz, Kivi"] },
        { category: "🌾 5. KİLER VE KURU GIDA", items: ["Tam Tahıllı Ekmek", "Bakliyatlar", "Kuruyemişler (Badem, Kaju, Ceviz)"] }
    ];

    let customBrunches = JSON.parse(localStorage.getItem('custom_brunches')) || [];
    let customSnacks = JSON.parse(localStorage.getItem('custom_snacks')) || [];
    let customDinners = JSON.parse(localStorage.getItem('custom_dinners')) || [];

    const brunches = [ 
        { name: "Yemek 1: Mozzarella & Avokado A", kcal: 450, pro: 25, fat: 30, carb: 20, text: "1 adet tam haşlanmış yumurta. 1 tam top taze Mozzarella di Bufala. Üzerine taze sıkılmış limon suyu eklenmiş yarım avokado. Yanında 1 ince dilim tam buğday ekmeği, taze fesleğen ve çeri domates.", ing: "• 1 tam yumurta (~50g)<br>• 1 top taze Mozzarella (~100g)<br>• Yarım avokado (~70g)<br>• 1 dilim tam buğday ekmeği (~30g)" }, 
        { name: "Yemek 2: Ricotta & Avokado B", kcal: 420, pro: 22, fat: 25, carb: 25, text: "Menemen, ricotta ve çavdar ekmeği.", ing: "• 2 tam yumurta (~100g)<br>• 3 ymk kaşığı Ricotta (~60g)" }
    ].concat(customBrunches);
    
    const snacks = [ { name: "Yemek 1: Kırmızı Orman Şöleni", kcal: 250, pro: 15, fat: 8, carb: 30, text: "Süzme yoğurt ve orman meyveleri.", ing: "• Süzme yoğurt (~150g)<br>• Çilek ve yaban mersini (~80g)" } ].concat(customSnacks);
    const dinners = [ { name: "Yemek 1: Patlıcanlı Tavuk Sote", kcal: 550, pro: 50, fat: 15, carb: 55, text: "200g tavuk ve bulgur.", ing: "• Çiğ tavuk göğsü (200g)<br>• Patlıcan (~200g)" } ].concat(customDinners);

    // --- TAKVİM ÜRETİCİ ---
    const planData = [];
    const startDate = new Date(2026, 3, 12); // Nisan 12
    const endDate = new Date(2026, 6, 1);    // Temmuz 1
    
    let loopDate = new Date(startDate); let dayCount = 0;
    while(loopDate <= endDate) {
        let pI = Math.floor((dayCount % 28) / 7);
        let dw = loopDate.getDay();
        let workout = (dw===1||dw===4)?"Grup Dersi (Kardiyo)":(dw===2||dw===5)?"Dinlenme":(dw===6)?"Doğa Yürüyüşü":["Ağırlık (Tüm Vücut)","Ağırlık (Hipertrofi)","Ağırlık (Maksimum Efor)","Ağırlık (Hafif)"][pI];
        planData.push({ dateObj: new Date(loopDate), phase: Object.keys(explanations.phases)[pI], workout: workout, b: dayCount%brunches.length, s: dayCount%snacks.length, d: dayCount%dinners.length });
        loopDate.setDate(loopDate.getDate()+1); dayCount++;
    }

    let currentDayIndex = 0;
    let waterState = JSON.parse(localStorage.getItem('damla_water')) || {};
    let suppState = JSON.parse(localStorage.getItem('damla_supps')) || {};
    let extraShoppingItems = JSON.parse(localStorage.getItem('damla_extras')) || [];

    // --- BAŞLATMA ---
    function init() {
        populateDropdowns();
        renderDay(getTodayIndex());
        initTheme();
    }

    function getTodayIndex() {
        const t = new Date(); 
        const idx = planData.findIndex(d => d.dateObj.getDate() === t.getDate() && d.dateObj.getMonth() === t.getMonth() && d.dateObj.getFullYear() === t.getFullYear());
        return idx !== -1 ? idx : 0; 
    }

    function populateDropdowns() {
        const bS = document.getElementById("brunchSelect"); const sS = document.getElementById("snackSelect"); const dS = document.getElementById("dinnerSelect");
        bS.innerHTML = ""; sS.innerHTML = ""; dS.innerHTML = "";
        brunches.forEach((m, i) => bS.add(new Option(m.name, i)));
        snacks.forEach((m, i) => sS.add(new Option(m.name, i)));
        dinners.forEach((m, i) => dS.add(new Option(m.name, i)));
    }

    // --- TAKVİM ÇİZİMİ ---
    function renderCalendar() {
        const grid = document.getElementById("calendarGrid");
        const cD = planData[currentDayIndex];
        const mNames = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
        document.getElementById("calendarMonthTitle").innerText = `${mNames[cD.dateObj.getMonth()]} ${cD.dateObj.getFullYear()} ▾`;
        
        grid.innerHTML = ""; 
        ["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"].forEach(d => { grid.innerHTML += `<div class="cal-day-name">${d}</div>`; });
        
        // Nisan 2026'da 1 Nisan Çarşamba (Day: 3). Mon-start calendar için offset = 2
        let firstDayDate = new Date(cD.dateObj.getFullYear(), cD.dateObj.getMonth(), 1);
        let firstDay = firstDayDate.getDay();
        let startOffset = firstDay === 0 ? 6 : firstDay - 1;
        
        for(let i=0; i<startOffset; i++) grid.innerHTML += `<div></div>`;
        
        const daysInMonth = new Date(cD.dateObj.getFullYear(), cD.dateObj.getMonth() + 1, 0).getDate();
        for (let d = 1; d <= daysInMonth; d++) {
            const dataIdx = planData.findIndex(p => p.dateObj.getDate() === d && p.dateObj.getMonth() === cD.dateObj.getMonth());
            const isDataAvailable = dataIdx !== -1;
            const isActive = dataIdx === currentDayIndex;
            
            let html = `<div class="cal-day ${isActive ? 'active' : ''} ${!isDataAvailable ? 'disabled' : ''}" ${isDataAvailable ? `onclick="renderDay(${dataIdx})"` : ''}>${d}`;
            if(isDataAvailable) {
                if(waterState[dataIdx] === 8) html += '<div class="cal-water-mark">🌱</div>';
                if(dataIdx % 7 === 0) html += '<div class="cal-cart-mark">🛒</div>';
            }
            html += `</div>`;
            grid.innerHTML += html;
        }
    }

    function renderDay(index) {
        currentDayIndex = index; const d = planData[index];
        document.getElementById("phaseBadgeText").innerText = d.phase;
        document.getElementById("workoutBadgeText").innerText = "🏃‍♀️ " + d.workout;
        document.getElementById("shopListBtn").style.display = (index % 7 === 0) ? 'block' : 'none';
        document.getElementById("brunchSelect").value = d.b;
        document.getElementById("snackSelect").value = d.s;
        document.getElementById("dinnerSelect").value = d.d;
        updateMeal('all'); renderWaterTracker(); renderSuppTracker(); renderCalendar();
    }

    function changeDay(step) {
        let nIdx = currentDayIndex + step;
        if(nIdx >= 0 && nIdx < planData.length) renderDay(nIdx);
    }

    // --- PAZAR LİSTESİ ---
    function openShoppingList() {
        let h = '<div id="shoppingChecklist">';
        let rowId = 0;
        masterShoppingList.forEach(cat => {
            h += `<h4 style="color:var(--heading-color); margin: 15px 0 10px 0; border-bottom: 2px dashed var(--wood-border); padding-bottom:5px;">${cat.category}</h4>`;
            cat.items.forEach(item => {
                h += `<div class="shopping-row" id="shop-row-${rowId}"><label class="shopping-item-check"><input type="checkbox"> <span class="shop-item-text">${item}</span></label><button class="delete-item-btn" onclick="removeShoppingRow(${rowId})">❌</button></div>`;
                rowId++;
            });
        });
        h += `<h4 style="color:var(--secondary); margin-top: 20px; border-bottom: 2px dashed var(--secondary);">✨ EKSTRALAR</h4><div id="extraItemsList">`;
        extraShoppingItems.forEach((item, idx) => { h += renderExtraRow(item, idx); });
        h += `</div><div class="extra-input-group"><input type="text" id="extraItemInput" class="extra-input" placeholder="Deterjan vb..."><button class="extra-add-btn" onclick="addExtraItem()">Ekle</button></div>`;
        h += '</div><button class="copy-btn" onclick="copyShoppingListText()">📋 Listeyi Kopyala</button>';
        document.getElementById("shoppingModalBody").innerHTML = h;
        document.getElementById("shoppingModal").style.display = "flex";
    }

    function renderExtraRow(item, idx) {
        return `<div class="shopping-row" id="extra-row-${idx}"><label class="shopping-item-check"><input type="checkbox"> <span class="shop-item-text">${item}</span></label><button class="delete-item-btn" onclick="removeExtraItem(${idx})">❌</button></div>`;
    }

    function addExtraItem() {
        const val = document.getElementById("extraItemInput").value;
        if(!val) return; extraShoppingItems.push(val);
        localStorage.setItem('damla_extras', JSON.stringify(extraShoppingItems));
        openShoppingList();
    }

    function removeExtraItem(idx) { extraShoppingItems.splice(idx, 1); localStorage.setItem('damla_extras', JSON.stringify(extraShoppingItems)); openShoppingList(); }
    function removeShoppingRow(id) { const row = document.getElementById(`shop-row-${id}`); row.style.opacity = '0'; setTimeout(() => row.remove(), 250); }
    function copyShoppingListText() {
        let text = "🛒 Pazar Listesi:\n";
        document.querySelectorAll(".shop-item-text").forEach(span => { text += "⬜ " + span.innerText + "\n"; });
        navigator.clipboard.writeText(text).then(() => alert("Kopyalandı!"));
    }

    // --- YEMEK EKLEME ---
    function saveNewMeal(e) {
        e.preventDefault();
        const type = document.getElementById("newMealType").value;
        const newMeal = {
            name: "🌟 " + document.getElementById("newMealName").value,
            text: "<p>" + document.getElementById("newMealText").value + "</p>",
            ing: document.getElementById("newMealIng").value.replace(/\n/g, "<br>"),
            kcal: parseInt(document.getElementById("newMealKcal").value) || 0,
            pro: parseInt(document.getElementById("newMealPro").value) || 0,
            fat: parseInt(document.getElementById("newMealFat").value) || 0,
            carb: parseInt(document.getElementById("newMealCarb").value) || 0
        };
        if(type === 'brunch') { customBrunches.push(newMeal); brunches.push(newMeal); localStorage.setItem('custom_brunches', JSON.stringify(customBrunches)); }
        else if(type === 'snack') { customSnacks.push(newMeal); snacks.push(newMeal); localStorage.setItem('custom_snacks', JSON.stringify(customSnacks)); }
        else { customDinners.push(newMeal); dinners.push(newMeal); localStorage.setItem('custom_dinners', JSON.stringify(customDinners)); }
        populateDropdowns(); closeModal(true, 'addMealModal'); alert("Tarif eklendi!");
    }

    // --- ÖĞÜN GÜNCELLEME ---
    function updateMeal(type) {
        let bIdx = document.getElementById("brunchSelect").value;
        let sIdx = document.getElementById("snackSelect").value;
        let dIdx = document.getElementById("dinnerSelect").value;

        if (type === 'brunch' || type === 'all') {
            document.getElementById("brunchIron").innerHTML = (currentDayIndex % 2 === 0) ? `<div class="iron-highlight-banner">🩸 GÜNLÜK İKSİR ZAMANI:<br>Oreferon + Lactoferrin İçilecek!</div>` : "";
            document.getElementById("brunchText").innerHTML = brunches[bIdx].text;
            document.getElementById("brunchMacros").innerHTML = getMacroHTML(brunches[bIdx]);
            document.getElementById("brunchIngredients").innerHTML = "<strong>⚖️ Tartı & Gramaj:</strong>" + formatIngredients(brunches[bIdx].ing, 'b');
        }
        if (type === 'snack' || type === 'all') {
            document.getElementById("snackText").innerHTML = snacks[sIdx].text;
            document.getElementById("snackMacros").innerHTML = getMacroHTML(snacks[sIdx]);
            document.getElementById("snackIngredients").innerHTML = "<strong>⚖️ Tartı & Gramaj:</strong>" + formatIngredients(snacks[sIdx].ing, 's');
        }
        if (type === 'dinner' || type === 'all') {
            document.getElementById("dinnerText").innerHTML = dinners[dIdx].text;
            document.getElementById("dinnerMacros").innerHTML = getMacroHTML(dinners[dIdx]);
            document.getElementById("dinnerIngredients").innerHTML = "<strong>⚖️ Tartı & Gramaj:</strong>" + formatIngredients(dinners[dIdx].ing, 'd');
        }
        let tk = brunches[bIdx].kcal + snacks[sIdx].kcal + dinners[dIdx].kcal;
        let tp = brunches[bIdx].pro + snacks[sIdx].pro + dinners[dIdx].pro;
        let tf = brunches[bIdx].fat + snacks[sIdx].fat + dinners[dIdx].fat;
        let tc = brunches[bIdx].carb + snacks[sIdx].carb + dinners[dIdx].carb;
        document.getElementById("totalMacros").innerHTML = `<div class="macro-badge m-kcal">🔥 ${tk} Kcal</div><div class="macro-badge m-pro">🥩 ${tp}g Protein</div><div class="macro-badge m-fat">🥑 ${tf}g Yağ</div><div class="macro-badge m-carb">🌾 ${tc}g Karb</div>`;
    }

    function formatIngredients(ing, meal) {
        let h = "";
        ing.split('<br>').forEach((it, idx) => {
            let id = `d${currentDayIndex}_${meal}_${idx}`;
            h += `<label class="ingredient-item"><input type="checkbox" onchange="saveCheck('${id}', this)" ${localStorage.getItem(id)?'checked':''}> <span>${it.replace('•','').trim()}</span></label>`;
        });
        return h;
    }
    function saveCheck(id, el) { if(el.checked) localStorage.setItem(id, '1'); else localStorage.removeItem(id); }
    function getMacroHTML(m) { return `<div class="macro-badge m-pro">🥩 ${m.pro}g</div><div class="macro-badge m-fat">🥑 ${m.fat}g</div><div class="macro-badge m-carb">🌾 ${m.carb}g</div>`; }

    // --- MODALLAR VE DİĞER ---
    function openModal(type) {
        const d = planData[currentDayIndex];
        if(type==='addMeal') document.getElementById("addMealModal").style.display="flex";
        else if(type==='month') document.getElementById("monthModal").style.display="flex";
    }
    function openInfoModal(type) {
        const d = planData[currentDayIndex];
        const title = type === 'phase' ? d.phase : "Günün Antrenmanı: " + d.workout;
        const body = type === 'phase' ? explanations.phases[d.phase] : explanations.workouts[d.workout];
        showGenericModal(title, body);
    }
    function showGenericModal(t, b) { document.getElementById("modalTitle").innerText=t; document.getElementById("modalBody").innerHTML=b; document.getElementById("genericModal").style.display="flex"; }
    function closeModal(f, id) { if(f || event.target.id === id) document.getElementById(id).style.display = "none"; }
    function jumpToMonth(m) { let idx = planData.findIndex(d => d.dateObj.getMonth() === m); if(idx!==-1) renderDay(idx); closeModal(true, 'monthModal'); }
    function renderWaterTracker() {
        const g = document.getElementById("waterGrid"); g.innerHTML = ""; const w = waterState[currentDayIndex] || 0;
        for (let i = 1; i <= 8; i++) {
            let d = document.createElement("span"); d.className = `water-drop ${i <= w ? 'active' : ''}`; d.innerHTML = "💧";
            d.onclick = () => { waterState[currentDayIndex] = i; localStorage.setItem('damla_water', JSON.stringify(waterState)); renderWaterTracker(); renderCalendar(); };
            g.appendChild(d);
        }
        document.getElementById("gerberaContainer").style.display = w === 8 ? "flex" : "none";
    }
    function renderSuppTracker() {
        const s = suppState[currentDayIndex] || { mag: false, vit: false, iron: false };
        document.getElementById("supp_mag").checked = s.mag; document.getElementById("supp_vit").checked = s.vit;
        if (currentDayIndex % 2 === 0) { document.getElementById("ironSuppLabel").style.display = "flex"; document.getElementById("supp_iron").checked = s.iron; }
        else document.getElementById("ironSuppLabel").style.display = "none";
    }
    function saveSuppState() {
        suppState[currentDayIndex] = { mag: document.getElementById("supp_mag").checked, vit: document.getElementById("supp_vit").checked, iron: document.getElementById("supp_iron") ? document.getElementById("supp_iron").checked : false };
        localStorage.setItem('damla_supps', JSON.stringify(suppState));
    }
    function toggleTheme() {
        let t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t);
    }
    function initTheme() { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light'); }

    window.onload = init;
</script>

</body>
</html>
